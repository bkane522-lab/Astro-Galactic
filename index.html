<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Astro Galactic</title>
<meta name="theme-color" content="#0a0e17">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/icons/icon-192.png">
<style>
  :root{
    --gold:#d4af37;
    --gold-bright:#f0c956;
    --gold-soft:#c49a2c;
    --night:#0a0e17;
    --night-mid:#12192b;
    --violet-deep:#1e1240;
    --electric:#3fb8f0;
    --emerald:#1b4b43;
    --text:#f2ead3;
    --text-dim:#9fa8b8;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{
    font-family:'Segoe UI',system-ui,-apple-system,sans-serif;
    background:radial-gradient(ellipse at 50% 20%,var(--violet-deep) 0%,var(--night-mid) 45%,var(--night) 100%);
    color:var(--text);
    min-height:100vh;
    overflow-x:hidden;
    position:relative;
  }
  body::before{
    content:'';
    position:fixed;inset:0;
    background-image:
      radial-gradient(1.5px 1.5px at 15% 25%, rgba(242,234,211,0.6), transparent),
      radial-gradient(1px 1px at 75% 15%, rgba(242,234,211,0.4), transparent),
      radial-gradient(1.5px 1.5px at 60% 70%, rgba(242,234,211,0.5), transparent),
      radial-gradient(1px 1px at 30% 85%, rgba(242,234,211,0.3), transparent),
      radial-gradient(1px 1px at 90% 60%, rgba(63,184,240,0.4), transparent);
    pointer-events:none;z-index:0;
  }
  .screen{position:relative;z-index:1;min-height:100vh;display:flex;flex-direction:column;}
  .hidden{display:none !important;}

  /* ===== ÉCRAN 1 : PORTAIL ===== */
  #portalScreen{align-items:center;justify-content:center;padding:32px 24px;text-align:center;}
  .brand{font-family:Georgia,serif;font-size:1.7rem;color:var(--gold-bright);letter-spacing:0.5px;margin-bottom:6px;}
  .brand-sub{color:var(--text-dim);font-size:0.85rem;font-style:italic;margin-bottom:40px;}

  .portal-circle{
    position:relative;width:220px;height:220px;margin:0 auto 40px;
    border-radius:50%;
    border:1.5px solid rgba(212,175,55,0.4);
    display:flex;align-items:center;justify-content:center;
  }
  .portal-circle::before{
    content:'';position:absolute;inset:14px;border-radius:50%;
    border:1px solid rgba(212,175,55,0.25);
  }
  .portal-circle::after{
    content:'';position:absolute;inset:28px;border-radius:50%;
    background:radial-gradient(circle,rgba(212,175,55,0.35) 0%,rgba(212,175,55,0.05) 60%,transparent 100%);
    animation:pulse 3s ease-in-out infinite;
  }
  @keyframes pulse{
    0%,100%{transform:scale(0.92);opacity:0.7;}
    50%{transform:scale(1.05);opacity:1;}
  }
  .portal-glyph{position:relative;z-index:2;font-size:3.2rem;filter:drop-shadow(0 0 10px rgba(212,175,55,0.6));}
  .portal-circle.revealing{animation:spinReveal 1.2s ease-out forwards;}
  @keyframes spinReveal{
    0%{transform:rotate(0deg) scale(1);}
    60%{transform:rotate(300deg) scale(1.08);}
    100%{transform:rotate(360deg) scale(1);}
  }

  .portal-text{font-size:1rem;color:var(--text);margin-bottom:28px;max-width:280px;line-height:1.5;}

  .portal-form{width:100%;max-width:320px;display:none;}
  .portal-form.active{display:block;}
  .portal-form label{display:block;font-size:0.8rem;color:var(--gold-bright);margin-bottom:6px;margin-top:14px;font-weight:600;text-align:left;}
  .portal-form label:first-child{margin-top:0;}
  input[type="date"],input[type="time"],input[type="text"]{
    width:100%;padding:12px 14px;border-radius:10px;
    border:1px solid rgba(212,175,55,0.3);
    background:rgba(6,10,18,0.6);color:var(--text);font-size:1rem;
  }
  input::-webkit-calendar-picker-indicator{filter:invert(1) sepia(1) saturate(3) hue-rotate(10deg);}
  .optional-tag{color:var(--text-dim);font-weight:400;font-size:0.72rem;}

  .btn-gold{
    width:100%;margin-top:18px;padding:14px;border:none;border-radius:12px;
    background:linear-gradient(90deg,var(--gold-soft),var(--gold-bright));
    color:#0a0e17;font-weight:700;font-size:1rem;cursor:pointer;
    box-shadow:0 4px 18px rgba(212,175,55,0.3);
  }
  .btn-gold:active{transform:scale(0.97);}
  .btn-ghost{
    width:100%;margin-top:12px;padding:12px;border-radius:12px;
    background:transparent;border:1px solid rgba(212,175,55,0.35);
    color:var(--text-dim);font-size:0.9rem;cursor:pointer;
  }

  /* ===== ÉCRAN 2 : GALAXIE PERSONNELLE ===== */
  #galaxyScreen{padding:20px 16px 40px;}
  .galaxy-header{text-align:center;margin-bottom:8px;}
  .galaxy-sign-emoji{font-size:2.6rem;filter:drop-shadow(0 0 8px rgba(212,175,55,0.5));}
  .galaxy-sign-name{font-family:Georgia,serif;font-size:1.3rem;color:var(--gold-bright);margin-top:4px;}
  .galaxy-sign-dates{font-size:0.75rem;color:var(--text-dim);}

  .modules-grid{
    display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:24px;
  }
  .module-card{
    background:linear-gradient(160deg,rgba(63,184,240,0.08),rgba(212,175,55,0.05));
    border:1px solid rgba(212,175,55,0.25);
    border-radius:16px;padding:16px 14px;
    display:flex;flex-direction:column;align-items:flex-start;gap:6px;
    cursor:pointer;transition:transform 0.15s ease, border-color 0.15s ease;
    position:relative;overflow:hidden;
  }
  .module-card:active{transform:scale(0.96);}
  .module-card.locked::after{
    content:'🔒';position:absolute;top:10px;right:12px;font-size:0.85rem;opacity:0.6;
  }
  .module-icon{font-size:1.5rem;}
  .module-title{font-size:0.85rem;font-weight:700;color:var(--text);}
  .module-energy{font-size:0.7rem;color:var(--gold-bright);}
  .module-card.oracle{
    grid-column:1 / -1;
    background:linear-gradient(120deg,rgba(30,18,64,0.5),rgba(212,175,55,0.08));
    border-color:rgba(63,184,240,0.4);
  }
  .module-card.oracle .module-title{color:var(--electric);}

  /* ===== MODAL DÉTAIL MODULE ===== */
  #moduleModal{
    position:fixed;inset:0;z-index:10;
    background:rgba(6,10,18,0.85);backdrop-filter:blur(4px);
    display:flex;align-items:flex-end;
  }
  #moduleModal.hidden{display:none;}
  .modal-sheet{
    width:100%;max-height:82vh;overflow-y:auto;
    background:linear-gradient(160deg,var(--night-mid),var(--night));
    border-top:1px solid rgba(212,175,55,0.4);
    border-radius:22px 22px 0 0;padding:22px 20px 30px;
    animation:slideUp 0.25s ease-out;
  }
  @keyframes slideUp{from{transform:translateY(30px);opacity:0;}to{transform:translateY(0);opacity:1;}}
  .modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;}
  .modal-title{font-family:Georgia,serif;font-size:1.15rem;color:var(--gold-bright);}
  .modal-close{background:none;border:none;color:var(--text-dim);font-size:1.4rem;cursor:pointer;line-height:1;}
  .modal-body{line-height:1.65;font-size:0.95rem;white-space:pre-wrap;}
  .loading{display:flex;align-items:center;gap:10px;color:var(--text-dim);font-size:0.9rem;}
  .spinner{
    width:18px;height:18px;border-radius:50%;
    border:2px solid rgba(212,175,55,0.3);border-top-color:var(--gold-bright);
    animation:spin 0.8s linear infinite;
  }
  @keyframes spin{to{transform:rotate(360deg);}}

  .oracle-input-row{display:flex;gap:8px;margin-bottom:16px;}
  .oracle-input-row input{flex:1;}
  .oracle-input-row button{
    padding:0 18px;border:none;border-radius:10px;
    background:var(--electric);color:#0a0e17;font-weight:700;cursor:pointer;
  }

  .share-btn{
    margin-top:18px;width:100%;padding:12px;border:none;border-radius:10px;
    background:rgba(212,175,55,0.15);border:1px solid rgba(212,175,55,0.4);
    color:var(--gold-bright);font-weight:700;font-size:0.9rem;cursor:pointer;
  }
</style>
</head>
<body>

<!-- ===== ÉCRAN 1 : PORTAIL DE NAISSANCE ===== -->
<div class="screen" id="portalScreen">
  <div class="brand">Astro Galactic</div>
  <div class="brand-sub">Votre carte céleste vous attend</div>

  <div class="portal-circle" id="portalCircle">
    <div class="portal-glyph" id="portalGlyph">✦</div>
  </div>

  <div id="portalIntro">
    <p class="portal-text">Franchissez le portail pour révéler votre signe et votre énergie du jour.</p>
    <button class="btn-gold" id="startBtn">Entrer ma date de naissance</button>
  </div>

  <form class="portal-form" id="portalForm">
    <label for="birthDate">Date de naissance</label>
    <input type="date" id="birthDate" required>

    <label for="birthTime">Heure de naissance <span class="optional-tag">(optionnel)</span></label>
    <input type="time" id="birthTime">

    <label for="birthPlace">Lieu de naissance <span class="optional-tag">(optionnel)</span></label>
    <input type="text" id="birthPlace" placeholder="Ville, Pays">

    <button type="submit" class="btn-gold">Franchir le portail ✦</button>
  </form>
</div>

<!-- ===== ÉCRAN 2 : GALAXIE PERSONNELLE ===== -->
<div class="screen hidden" id="galaxyScreen">
  <div class="galaxy-header">
    <div class="galaxy-sign-emoji" id="gSignEmoji">♈</div>
    <div class="galaxy-sign-name" id="gSignName">—</div>
    <div class="galaxy-sign-dates" id="gSignDates">—</div>
  </div>

  <div class="modules-grid">
    <div class="module-card" data-module="horoscope">
      <div class="module-icon">🌙</div>
      <div class="module-title">Horoscope du jour</div>
      <div class="module-energy" id="energyHoroscope">—</div>
    </div>
    <div class="module-card" data-module="amour">
      <div class="module-icon">💛</div>
      <div class="module-title">Amour</div>
      <div class="module-energy" id="energyAmour">—</div>
    </div>
    <div class="module-card" data-module="argent">
      <div class="module-icon">✦</div>
      <div class="module-title">Argent</div>
      <div class="module-energy" id="energyArgent">—</div>
    </div>
    <div class="module-card" data-module="energie">
      <div class="module-icon">⚡</div>
      <div class="module-title">Énergie</div>
      <div class="module-energy" id="energyEnergie">—</div>
    </div>
    <div class="module-card locked" data-module="theme">
      <div class="module-icon">🗺️</div>
      <div class="module-title">Thème astral complet</div>
      <div class="module-energy">Premium</div>
    </div>
    <div class="module-card locked" data-module="compatibilite">
      <div class="module-icon">💞</div>
      <div class="module-title">Compatibilité</div>
      <div class="module-energy">Premium</div>
    </div>
    <div class="module-card oracle" data-module="oracle">
      <div class="module-icon">🔮</div>
      <div class="module-title">Oracle IA — Pose ta question à l'univers</div>
    </div>
  </div>
</div>

<!-- ===== MODAL DÉTAIL ===== -->
<div id="moduleModal" class="hidden">
  <div class="modal-sheet">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle">—</div>
      <button class="modal-close" id="modalClose">✕</button>
    </div>
    <div id="modalOracleInput" class="oracle-input-row hidden">
      <input type="text" id="oracleQuestion" placeholder="Ex: Dois-je lui écrire ?">
      <button id="oracleAskBtn">Demander</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
    <button class="share-btn hidden" id="shareBtn">Partager ma carte ✦</button>
  </div>
</div>

<canvas id="shareCanvas" width="1080" height="1920" class="hidden"></canvas>

<script src="/app.js"></script>
</body>
</html>
