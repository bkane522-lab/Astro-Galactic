<!doctype html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#020816">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Astro Galactic</title>
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<link rel="icon" href="/icon-192.png">
<style>
:root{
  --gold:#e6a936;
  --gold2:#ffd978;
  --cream:#fff0be;
  --soft:rgba(255,247,223,.76);
  --safeTop:env(safe-area-inset-top,0px);
  --safeBottom:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;font-variant-emoji:text}
html,body{height:100%;overflow:hidden;background:#000;color:var(--cream);font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif}
button{font:inherit;border:0;background:none;color:inherit;cursor:pointer}
body{display:grid;place-items:center}
.app{
  position:relative;
  width:min(100vw,430px);
  height:100dvh;
  max-height:932px;
  overflow:hidden;
  background:#020816;
}
@media(min-width:720px){
  .app{
    height:min(100vh,920px);
    border-radius:34px;
    border:1px solid rgba(230,169,54,.34);
    box-shadow:0 30px 100px rgba(0,0,0,.75);
  }
}
.visual{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  object-fit:cover;
  object-position:center;
  user-select:none;
  pointer-events:none;
}
.hot{
  position:absolute;
  z-index:5;
  background:transparent;
  color:transparent;
  border:0;
}
.hot:active{background:rgba(255,217,120,.08)}
.menu{left:3%;top:2.5%;width:13%;height:7%}
.profile{right:3%;top:2.5%;width:13%;height:7%}
.left{left:0;top:36%;width:17%;height:12%}
.right{right:0;top:36%;width:17%;height:12%}
.wheel{left:9%;right:9%;top:21%;height:37%;border-radius:50%;touch-action:none}
.cta{left:12%;right:12%;bottom:3.4%;height:6.5%;border-radius:999px}
.affinity{left:14%;right:14%;bottom:19.7%;height:6%}
.share{left:20%;right:20%;bottom:.2%;height:3%}
.picker{
  position:absolute;left:12px;right:12px;bottom:calc(12px + var(--safeBottom));
  border-radius:26px;border:1px solid rgba(230,169,54,.34);
  background:rgba(3,10,22,.92);
  backdrop-filter:blur(14px);
  padding:14px;
  z-index:20;
  display:none;
  box-shadow:0 20px 70px rgba(0,0,0,.55);
}
.picker.open{display:block}
.picker h3{
  font-family:Georgia,serif;
  font-weight:400;
  text-align:center;
  color:var(--gold2);
  font-size:25px;
  margin-bottom:10px;
}
.grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:8px;
}
.zbtn{
  min-height:58px;
  border-radius:17px;
  border:1px solid rgba(230,169,54,.20);
  background:rgba(2,8,18,.50);
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  color:var(--soft);
}
.zbtn .g{font-family:Georgia,serif;color:var(--gold2);font-size:24px;line-height:1}
.zbtn .n{font-size:10px;margin-top:4px}
.zbtn.sel{
  border-color:rgba(255,217,120,.82);
  background:linear-gradient(160deg,rgba(230,169,54,.23),rgba(5,16,34,.70));
  color:#fff7df;
}
.overlay{
  position:absolute;
  inset:0;
  display:none;
  align-items:center;
  justify-content:center;
  background:rgba(2,8,18,.73);
  backdrop-filter:blur(10px);
  padding:18px;
  z-index:30;
}
.overlay.open{display:flex}
.modal{
  width:100%;
  max-width:390px;
  border-radius:30px;
  border:1px solid rgba(230,169,54,.36);
  background:
    radial-gradient(circle at 50% 0%,rgba(255,217,120,.14),transparent 44%),
    linear-gradient(180deg,rgba(6,23,43,.98),rgba(2,8,18,.98));
  box-shadow:0 24px 80px rgba(0,0,0,.58);
  text-align:center;
  padding:22px 20px 20px;
}
.modal small{
  display:block;
  color:var(--gold2);
  font-size:10px;
  letter-spacing:.35em;
  text-transform:uppercase;
  margin-bottom:10px;
}
.modal h2{
  font-family:Georgia,serif;
  color:var(--cream);
  font-size:34px;
  line-height:1.03;
  font-weight:400;
  margin-bottom:14px;
}
.modal p{
  font-family:Georgia,serif;
  color:var(--cream);
  font-size:21px;
  line-height:1.42;
  margin-bottom:14px;
}
.note{
  border:1px solid rgba(230,169,54,.24);
  border-radius:18px;
  color:var(--soft);
  padding:12px;
  font-size:13px;
  margin:12px 0;
  line-height:1.35;
}
.btn{
  width:100%;
  height:54px;
  border-radius:999px;
  background:linear-gradient(100deg,#c87b14,#ffd978 58%,#fff0be);
  color:#090714;
  font-weight:900;
  font-size:16px;
  box-shadow:0 15px 35px -10px rgba(230,169,54,.70);
}
.btn2{
  margin-top:10px;
  background:transparent;
  border:1px solid rgba(230,169,54,.30);
  color:var(--gold2);
  box-shadow:none;
}
.badge{
  position:absolute;
  top:calc(10px + var(--safeTop));
  left:50%;
  transform:translateX(-50%);
  z-index:12;
  pointer-events:none;
  opacity:0;
  background:rgba(3,10,22,.92);
  border:1px solid rgba(230,169,54,.35);
  color:var(--gold2);
  border-radius:999px;
  padding:8px 14px;
  font-weight:800;
  transition:.25s;
}
.badge.show{opacity:1}
</style>
</head>
<body>
<main class="app">
  <img class="visual" src="/assets/astro-galactic-v19-ui.png" alt="Astro Galactic — Message des étoiles">
  <div class="badge" id="badge">Signe changé</div>

  <button class="hot menu" onclick="openMenu()" aria-label="Menu">Menu</button>
  <button class="hot profile" onclick="openProfile()" aria-label="Profil">Profil</button>
  <button class="hot left" onclick="previousSign()" aria-label="Signe précédent">Précédent</button>
  <button class="hot right" onclick="nextSign()" aria-label="Signe suivant">Suivant</button>
  <button class="hot wheel" id="wheelTouch" onclick="openPicker()" aria-label="Faire tourner la roue">Roue</button>
  <button class="hot affinity" onclick="openAffinity()" aria-label="Affinité du jour">Affinité</button>
  <button class="hot cta" onclick="openConseil()" aria-label="Découvrir le conseil complet">Conseil</button>
  <button class="hot share" onclick="shareMessage()" aria-label="Partager">Partager</button>

  <div class="picker" id="picker">
    <h3>Choisissez votre signe</h3>
    <div class="grid" id="grid"></div>
    <button class="btn btn2" onclick="closePicker()">Fermer</button>
  </div>

  <div class="overlay" id="overlay" onclick="if(event.target===this)closeModal()">
    <div class="modal" id="modal"></div>
  </div>
</main>

<script>
const SIGNS=[
{k:'belier',n:'Bélier',g:'♈︎',msg:'Une impulsion juste peut ouvrir une porte aujourd’hui.',aff:'Lion',stone:'Grenat',color:'Rouge or',num:'3',conseil:'Choisissez une action simple et terminez-la avant d’en commencer une autre.'},
{k:'taureau',n:'Taureau',g:'♉︎',msg:'La stabilité vous donne une vraie force aujourd’hui.',aff:'Vierge',stone:'Quartz rose',color:'Vert doré',num:'6',conseil:'Avancez sans vous presser. Une décision posée vaut mieux qu’un grand mouvement forcé.'},
{k:'gemeaux',n:'Gémeaux',g:'♊︎',msg:'Une conversation peut débloquer une situation.',aff:'Balance',stone:'Citrine',color:'Jaune clair',num:'5',conseil:'Dites ce que vous ressentez simplement. La clarté évite les détours inutiles.'},
{k:'cancer',n:'Cancer',g:'♋︎',msg:'Votre intuition capte ce que les mots ne disent pas.',aff:'Poissons',stone:'Pierre de lune',color:'Perle',num:'2',conseil:'Protégez votre énergie. Gardez de la place pour ce qui vous apaise vraiment.'},
{k:'lion',n:'Lion',g:'♌︎',msg:'Aujourd’hui, l’univers vous invite à ralentir pour mieux entendre votre véritable voix intérieure.',aff:'Taureau',stone:'Citrine',color:'Or solaire',num:'7',conseil:'Aujourd’hui, choisissez une seule action importante. Faites-la lentement, avec présence, sans chercher à tout contrôler.'},
{k:'vierge',n:'Vierge',g:'♍︎',msg:'Un détail bien réglé peut alléger toute votre journée.',aff:'Capricorne',stone:'Jaspe',color:'Sable doré',num:'4',conseil:'Simplifiez votre liste. Une priorité claire suffit pour reprendre la main.'},
{k:'balance',n:'Balance',g:'♎︎',msg:'L’harmonie revient quand vous arrêtez de porter tout seul.',aff:'Gémeaux',stone:'Lapis-lazuli',color:'Rose doré',num:'8',conseil:'Cherchez l’équilibre, mais ne vous oubliez pas pour garder la paix.'},
{k:'scorpion',n:'Scorpion',g:'♏︎',msg:'Une vérité intérieure demande à être respectée.',aff:'Cancer',stone:'Obsidienne',color:'Pourpre',num:'9',conseil:'Ne forcez pas les réponses. Observez, puis agissez avec précision.'},
{k:'sagittaire',n:'Sagittaire',g:'♐︎',msg:'Un nouvel horizon vous redonne de l’élan.',aff:'Bélier',stone:'Turquoise',color:'Bleu nuit',num:'1',conseil:'Ouvrez une piste. Même petite, elle peut relancer votre mouvement.'},
{k:'capricorne',n:'Capricorne',g:'♑︎',msg:'Votre patience prépare une avancée solide.',aff:'Taureau',stone:'Onyx',color:'Bronze',num:'10',conseil:'Gardez le cap. Une étape régulière vaut mieux qu’un effort épuisant.'},
{k:'verseau',n:'Verseau',g:'♒︎',msg:'Une idée différente peut devenir votre avantage.',aff:'Sagittaire',stone:'Améthyste',color:'Électrique',num:'11',conseil:'Notez l’idée qui revient souvent. Elle peut contenir votre prochaine direction.'},
{k:'poissons',n:'Poissons',g:'♓︎',msg:'Votre sensibilité devient une boussole précieuse.',aff:'Cancer',stone:'Aigue-marine',color:'Bleu doré',num:'7',conseil:'Accordez-vous un vrai moment de silence. Votre intuition sait déjà ce qui compte.'}
];
const $=s=>document.querySelector(s);
let current=Number(localStorage.getItem('astro-v19-index')||11);
function sign(){return SIGNS[current]}
function showBadge(txt){const b=$('#badge');b.textContent=txt;b.classList.add('show');setTimeout(()=>b.classList.remove('show'),1200)}
function save(){localStorage.setItem('astro-v19-index',current)}
function nextSign(){current=(current+1)%SIGNS.length;save();renderPicker();showBadge(sign().g+' '+sign().n)}
function previousSign(){current=(current-1+SIGNS.length)%SIGNS.length;save();renderPicker();showBadge(sign().g+' '+sign().n)}
function selectSign(i){current=i;save();renderPicker();closePicker();showBadge(sign().g+' '+sign().n)}
function renderPicker(){
  $('#grid').innerHTML=SIGNS.map((s,i)=>`<button class="zbtn ${i===current?'sel':''}" onclick="selectSign(${i})"><span class="g">${s.g}</span><span class="n">${s.n}</span></button>`).join('');
}
function openPicker(){renderPicker();$('#picker').classList.add('open')}
function closePicker(){$('#picker').classList.remove('open')}
function openModal(html){$('#modal').innerHTML=html;$('#overlay').classList.add('open')}
function closeModal(){$('#overlay').classList.remove('open')}
function openConseil(){const s=sign();openModal(`<small>Conseil complet</small><h2>${s.g} ${s.n}</h2><p>${s.conseil}</p><div class="note">Nombre : ${s.num} · Couleur : ${s.color} · Pierre : ${s.stone}</div><button class="btn" onclick="closeModal()">Compris</button>`)}
function openAffinity(){const s=sign();openModal(`<small>Affinité du jour</small><h2>${s.aff}</h2><p>Une connexion favorable pour avancer avec plus de confiance et de douceur.</p><button class="btn" onclick="closeModal()">Fermer</button>`)}
function openMenu(){const s=sign();openModal(`<small>Astro Galactic</small><h2>${s.n}</h2><p>${s.msg}</p><div class="note">Utilise les flèches ou touche la roue pour choisir ton signe.</div><button class="btn" onclick="openPicker()">Changer de signe</button><button class="btn btn2" onclick="closeModal()">Fermer</button>`)}
function openProfile(){const s=sign();openModal(`<small>Profil astral</small><h2>Signe : ${s.n}</h2><p>${s.msg}</p><button class="btn" onclick="openPicker()">Changer mon signe</button><button class="btn btn2" onclick="closeModal()">Fermer</button>`)}
async function shareMessage(){const s=sign();const text=`Astro Galactic — ${s.n} : ${s.msg}`;try{if(navigator.share){await navigator.share({title:'Astro Galactic',text})}else{await navigator.clipboard.writeText(text);showBadge('Message copié ✨')}}catch(e){}}

let startX=0;
const wheel=$('#wheelTouch');
wheel.addEventListener('touchstart',e=>{startX=e.touches[0].clientX},{passive:true});
wheel.addEventListener('touchend',e=>{
  const end=e.changedTouches[0].clientX;
  if(end-startX>35) previousSign();
  if(startX-end>35) nextSign();
},{passive:true});

renderPicker();
if('serviceWorker' in navigator){navigator.serviceWorker.register('/sw.js').catch(()=>{})}
</script>
</body>
</html>
