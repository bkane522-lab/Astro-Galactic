<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Astro Galactic — Ton horoscope cosmique</title>
<meta name="description" content="Horoscope quotidien, thème astral et compatibilité amoureuse générés par IA.">
<meta name="theme-color" content="#0b1521">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/icons/icon-192.png">
<style>
  :root{
    --gold:#d4af37;
    --gold-bright:#f0c956;
    --gold-soft:#c49a2c;
    --night:#0b1521;
    --night-mid:#132436;
    --emerald:#1b4b43;
    --emerald-soft:#2d6b5f;
    --text:#f2ead3;
    --text-dim:#a9b8c4;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    font-family:'Segoe UI',system-ui,-apple-system,sans-serif;
    background:radial-gradient(ellipse at top,var(--night-mid) 0%,var(--night) 65%,#060c14 100%);
    color:var(--text);
    min-height:100vh;
    overflow-x:hidden;
    position:relative;
  }
  /* motif géométrique cryptique discret en fond, pas des étoiles génériques */
  body::before{
    content:'';
    position:fixed;inset:0;
    background-image:
      repeating-linear-gradient(60deg, rgba(212,175,55,0.035) 0px, rgba(212,175,55,0.035) 1px, transparent 1px, transparent 60px),
      repeating-linear-gradient(-60deg, rgba(27,75,67,0.06) 0px, rgba(27,75,67,0.06) 1px, transparent 1px, transparent 60px),
      radial-gradient(1px 1px at 20% 30%, rgba(242,234,211,0.5), transparent),
      radial-gradient(1px 1px at 70% 60%, rgba(242,234,211,0.4), transparent),
      radial-gradient(1px 1px at 40% 85%, rgba(242,234,211,0.3), transparent);
    pointer-events:none;
    z-index:0;
  }
  .app{position:relative;z-index:1;max-width:480px;margin:0 auto;padding:24px 20px 40px;}
  header{text-align:center;margin-bottom:20px;}
  .logo{font-size:2.2rem;margin-bottom:4px;filter:drop-shadow(0 0 6px rgba(212,175,55,0.4));}
  h1{
    font-size:1.6rem;
    font-family:Georgia,'Times New Roman',serif;
    color:var(--gold-bright);
    font-weight:700;
    letter-spacing:0.5px;
  }
  .divider{
    display:flex;align-items:center;justify-content:center;gap:8px;
    margin:12px auto 14px;width:80%;max-width:220px;
  }
  .divider::before,.divider::after{
    content:'';flex:1;height:1px;
    background:linear-gradient(90deg,transparent,rgba(212,175,55,0.6));
  }
  .divider::after{background:linear-gradient(90deg,rgba(212,175,55,0.6),transparent);}
  .divider-mark{
    width:6px;height:6px;border:1px solid var(--gold);border-radius:50%;
    transform:rotate(45deg);
  }
  .tagline{color:var(--text-dim);font-size:0.78rem;margin-top:2px;letter-spacing:0.3px;}

  .card{
    background:linear-gradient(160deg,rgba(27,75,67,0.22),rgba(212,175,55,0.05));
    border:1px solid rgba(212,175,55,0.25);
    border-radius:18px;
    padding:22px;
    margin-bottom:20px;
    backdrop-filter:blur(6px);
    box-shadow:0 8px 28px rgba(0,0,0,0.35);
  }

  .setup-card label{
    display:block;font-size:0.85rem;color:var(--gold-bright);margin-bottom:6px;margin-top:14px;font-weight:600;
  }
  .setup-card label:first-child{margin-top:0;}
  input[type="date"], input[type="time"], input[type="text"]{
    width:100%;padding:12px 14px;border-radius:10px;
    border:1px solid rgba(212,175,55,0.3);
    background:rgba(6,12,20,0.6);color:var(--text);font-size:1rem;
  }
  input::-webkit-calendar-picker-indicator{filter:invert(1) sepia(1) saturate(3) hue-rotate(10deg);}
  .optional-tag{color:var(--text-dim);font-weight:400;font-size:0.75rem;}

  .btn-primary{
    width:100%;margin-top:20px;padding:14px;border:none;border-radius:12px;
    background:linear-gradient(90deg,var(--gold-soft),var(--gold-bright));
    color:#0b1521;font-weight:700;font-size:1rem;cursor:pointer;
    box-shadow:0 4px 18px rgba(212,175,55,0.3);
    transition:transform 0.15s ease;
  }
  .btn-primary:active{transform:scale(0.97);}

  .sign-badge{
    display:flex;align-items:center;gap:12px;margin-bottom:14px;
    padding-bottom:14px;border-bottom:1px solid rgba(212,175,55,0.15);
  }
  .sign-emoji{font-size:2.4rem;filter:drop-shadow(0 0 5px rgba(212,175,55,0.3));}
  .sign-name{font-size:1.25rem;font-weight:700;color:var(--gold-bright);font-family:Georgia,serif;}
  .sign-dates{font-size:0.75rem;color:var(--text-dim);}

  .day-tabs{
    display:flex;gap:6px;margin-bottom:16px;
    background:rgba(6,12,20,0.5);border-radius:10px;padding:4px;
  }
  .day-tab{
    flex:1;text-align:center;padding:8px 4px;border-radius:8px;
    font-size:0.8rem;color:var(--text-dim);cursor:pointer;font-weight:600;
    transition:background 0.15s ease, color 0.15s ease;
  }
  .day-tab.active{background:linear-gradient(90deg,var(--gold-soft),var(--gold-bright));color:#0b1521;}

  .horoscope-text{line-height:1.65;font-size:0.95rem;color:var(--text);white-space:pre-wrap;}
  .loading{display:flex;align-items:center;gap:10px;color:var(--text-dim);font-size:0.9rem;}
  .spinner{
    width:18px;height:18px;border-radius:50%;
    border:2px solid rgba(212,175,55,0.3);border-top-color:var(--gold-bright);
    animation:spin 0.8s linear infinite;
  }
  @keyframes spin{to{transform:rotate(360deg);}}

  .section-title{font-size:0.72rem;text-transform:uppercase;letter-spacing:1.5px;color:var(--emerald-soft);margin-bottom:10px;font-weight:700;}

  .premium-teaser{
    display:flex;justify-content:space-between;align-items:center;
    padding:16px;border-radius:14px;
    background:linear-gradient(120deg,rgba(27,75,67,0.35),rgba(212,175,55,0.12));
    border:1px solid rgba(212,175,55,0.35);
  }
  .premium-teaser div{flex:1;}
  .premium-title{font-weight:700;color:var(--gold-bright);font-size:0.95rem;font-family:Georgia,serif;}
  .premium-desc{font-size:0.78rem;color:var(--text-dim);margin-top:2px;}
  .btn-premium{
    padding:10px 16px;border:none;border-radius:9px;
    background:var(--gold-bright);color:#0b1521;font-weight:700;font-size:0.85rem;
    white-space:nowrap;cursor:pointer;
  }

  .hidden{display:none !important;}
  .change-birthdate{
    background:none;border:none;color:var(--text-dim);font-size:0.78rem;
    text-decoration:underline;margin-top:2px;cursor:pointer;display:block;
    margin-left:auto;margin-right:auto;
  }
</style>
</head>
<body>
<div class="app">

  <header>
    <div class="logo">🦁✨</div>
    <h1>Astro Galactic</h1>
    <div class="divider"><span class="divider-mark"></span></div>
    <div class="tagline">Ton ciel, tes réponses</div>
  </header>

  <!-- ÉCRAN 1 : Saisie date de naissance -->
  <section id="setupScreen" class="card setup-card">
    <div class="section-title">Ton portrait cosmique</div>

    <label for="birthDate">Date de naissance</label>
    <input type="date" id="birthDate" required>

    <label for="birthTime">Heure de naissance <span class="optional-tag">(optionnel — thème avancé)</span></label>
    <input type="time" id="birthTime">

    <label for="birthPlace">Lieu de naissance <span class="optional-tag">(optionnel — thème avancé)</span></label>
    <input type="text" id="birthPlace" placeholder="Ville, Pays">

    <button class="btn-primary" id="revealBtn">Révéler mon signe ✨</button>
  </section>

  <!-- ÉCRAN 2 : Horoscope -->
  <section id="resultScreen" class="hidden">

    <div class="card">
      <div class="sign-badge">
        <div class="sign-emoji" id="signEmoji">♈</div>
        <div>
          <div class="sign-name" id="signName">—</div>
          <div class="sign-dates" id="signDates">—</div>
        </div>
      </div>

      <div class="day-tabs">
        <div class="day-tab active" data-day="today">Aujourd'hui</div>
        <div class="day-tab" data-day="tomorrow">Demain</div>
        <div class="day-tab" data-day="week">Cette semaine</div>
      </div>

      <div id="horoscopeContent">
        <div class="loading"><div class="spinner"></div> Consultation des étoiles...</div>
      </div>
    </div>

    <div class="card premium-teaser">
      <div>
        <div class="premium-title">Thème astral complet</div>
        <div class="premium-desc">Analyse détaillée + compatibilité amoureuse</div>
      </div>
      <button class="btn-premium" id="premiumBtn">Débloquer</button>
    </div>

    <button class="change-birthdate" id="changeBtn">Changer ma date de naissance</button>
  </section>

</div>

<script src="/app.js"></script>
</body>
</html>
