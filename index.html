<!doctype html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#030914">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Astro Galactic</title>
<meta name="description" content="Astro Galactic — Message des étoiles, horoscope quotidien premium.">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<link rel="icon" href="/icon-192.png">
<style>
:root{
  --bg:#030914;
  --gold:#e6a936;
  --gold2:#ffd978;
  --cream:#fff0be;
  --safeTop:env(safe-area-inset-top,0px);
  --safeBottom:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{
  height:100%;
  overflow:hidden;
  background:#000;
  font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
}
body{
  display:grid;
  place-items:center;
}
.app{
  position:relative;
  width:min(100vw,430px);
  height:100dvh;
  max-height:932px;
  overflow:hidden;
  background:#030914;
}
@media(min-width:720px){
  .app{
    width:min(78vw,430px);
    height:min(100vh,920px);
    border-radius:34px;
    border:1px solid rgba(230,169,54,.32);
    box-shadow:0 30px 100px rgba(0,0,0,.72);
  }
}
.tableau{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  object-fit:cover;
  object-position:center;
  user-select:none;
  pointer-events:none;
}
.hotspot{
  position:absolute;
  border:0;
  background:transparent;
  color:transparent;
  cursor:pointer;
  z-index:3;
}
.hotspot:active{
  background:rgba(255,217,120,.08);
}
.menuHot{
  left:4%;
  top:2%;
  width:14%;
  height:8%;
}
.profileHot{
  right:4%;
  top:2%;
  width:14%;
  height:8%;
}
.ctaHot{
  left:10%;
  right:10%;
  bottom:4.8%;
  height:7.5%;
  border-radius:999px;
}
.shareHot{
  left:22%;
  right:22%;
  bottom:.7%;
  height:3.8%;
  border-radius:999px;
}
.overlay{
  position:absolute;
  inset:0;
  display:none;
  align-items:center;
  justify-content:center;
  padding:18px;
  background:rgba(2,8,18,.72);
  backdrop-filter:blur(10px);
  z-index:10;
}
.overlay.open{display:flex}
.modal{
  width:100%;
  max-width:390px;
  border-radius:30px;
  border:1px solid rgba(230,169,54,.32);
  background:
    radial-gradient(circle at 50% 0%,rgba(230,169,54,.16),transparent 42%),
    linear-gradient(180deg,rgba(7,22,41,.98),rgba(4,11,24,.98));
  color:var(--cream);
  padding:22px 20px 20px;
  text-align:center;
  box-shadow:0 24px 80px rgba(0,0,0,.54);
}
.modal small{
  display:block;
  color:var(--gold2);
  letter-spacing:.34em;
  text-transform:uppercase;
  font-size:10px;
  margin-bottom:10px;
}
.modal h2{
  font-family:Georgia,serif;
  font-size:34px;
  font-weight:400;
  line-height:1.05;
  margin-bottom:12px;
}
.modal p{
  font-family:Georgia,serif;
  color:#fff3c9;
  font-size:20px;
  line-height:1.45;
  margin-bottom:16px;
}
.premiumLine{
  border:1px solid rgba(230,169,54,.24);
  border-radius:18px;
  padding:12px;
  margin:12px 0;
  color:rgba(255,247,223,.72);
  font-size:13px;
}
.btn{
  width:100%;
  height:54px;
  border:0;
  border-radius:999px;
  background:linear-gradient(100deg,#d99221,#ffd978 55%,#fff0be);
  color:#090714;
  font-weight:900;
  font-size:16px;
  cursor:pointer;
}
.btnGhost{
  margin-top:10px;
  background:transparent;
  border:1px solid rgba(230,169,54,.28);
  color:#ffd978;
}
.toast{
  position:absolute;
  left:18px;
  right:18px;
  bottom:calc(18px + var(--safeBottom));
  min-height:48px;
  border-radius:18px;
  display:none;
  align-items:center;
  justify-content:center;
  background:rgba(4,11,24,.92);
  border:1px solid rgba(230,169,54,.32);
  color:#ffd978;
  z-index:20;
  font-weight:800;
}
.toast.show{display:flex}
</style>
</head>
<body>
<main class="app">
  <img class="tableau" src="/assets/message-des-etoiles.png" alt="Astro Galactic — Message des étoiles">

  <button class="hotspot menuHot" onclick="openInfo()" aria-label="Menu">Menu</button>
  <button class="hotspot profileHot" onclick="openProfile()" aria-label="Profil">Profil</button>
  <button class="hotspot ctaHot" onclick="openConseil()" aria-label="Découvrir le conseil complet">Découvrir le conseil complet</button>
  <button class="hotspot shareHot" onclick="shareMessage()" aria-label="Partager votre message du jour">Partager</button>

  <div class="overlay" id="overlay" onclick="if(event.target===this)closeModal()">
    <div class="modal" id="modal"></div>
  </div>

  <div class="toast" id="toast">Message copié ✨</div>
</main>

<script>
const $ = s => document.querySelector(s);

function openModal(html){
  $('#modal').innerHTML = html;
  $('#overlay').classList.add('open');
}
function closeModal(){
  $('#overlay').classList.remove('open');
}
function openConseil(){
  openModal(`
    <small>Conseil complet</small>
    <h2>Ralentir pour mieux viser</h2>
    <p>Aujourd’hui, choisissez une seule action importante. Faites-la lentement, avec présence, sans chercher à tout contrôler.</p>
    <div class="premiumLine">Version premium : lecture longue, prévision mensuelle, compatibilité avancée et carte partageable.</div>
    <button class="btn" onclick="closeModal()">Compris</button>
  `);
}
function openInfo(){
  openModal(`
    <small>Astro Galactic</small>
    <h2>Message des étoiles</h2>
    <p>Votre rituel cosmique quotidien, pensé pour être simple, beau et direct.</p>
    <button class="btn" onclick="closeModal()">Fermer</button>
  `);
}
function openProfile(){
  openModal(`
    <small>Profil astral</small>
    <h2>Signe : Lion</h2>
    <p>Le choix du signe sera connecté ici dans la prochaine version interactive.</p>
    <button class="btn" onclick="closeModal()">Fermer</button>
    <button class="btn btnGhost" onclick="closeModal()">Changer plus tard</button>
  `);
}
async function shareMessage(){
  const text = "Astro Galactic — Aujourd’hui, l’univers vous invite à ralentir pour mieux entendre votre véritable voix intérieure.";
  try{
    if(navigator.share){
      await navigator.share({title:"Astro Galactic", text});
    }else{
      await navigator.clipboard.writeText(text);
      showToast();
    }
  }catch(e){}
}
function showToast(){
  const t = $('#toast');
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 1800);
}
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('/sw.js').catch(()=>{});
}
</script>
</body>
</html>
