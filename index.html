:root{--gold:#d99722;--gold2:#ffd978;--cream:#fff2c4;--muted:rgba(255,242,196,.74);--line:rgba(232,172,58,.38);--safeTop:env(safe-area-inset-top,0px);--safeBottom:env(safe-area-inset-bottom,0px)}*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;font-variant-emoji:text}html,body{height:100%;overflow:hidden;background:#000;color:var(--cream);font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif}button{font:inherit;border:0;background:none;color:inherit;cursor:pointer}body{display:grid;place-items:center}.app{position:relative;width:min(100vw,430px);height:100dvh;max-height:932px;overflow:hidden;background:#020816 url('/assets/astro-galactic-bg.png') center/cover no-repeat}.app:before{content:"";position:absolute;inset:0;background:radial-gradient(circle at 50% 36%,rgba(232,172,58,.22),transparent 34%),linear-gradient(180deg,rgba(0,0,0,.04),rgba(0,0,0,.20));pointer-events:none}@media(min-width:720px){.app{height:min(100vh,920px);border-radius:34px;border:1px solid var(--line);box-shadow:0 30px 100px rgba(0,0,0,.75)}}.top{position:absolute;z-index:5;left:18px;right:18px;top:calc(14px + var(--safeTop));display:flex;align-items:center;justify-content:space-between}.iconBtn{width:48px;height:48px;border-radius:50%;border:1px solid var(--line);background:rgba(3,10,22,.45);display:grid;place-items:center;color:var(--gold2);font-size:24px}.brand{text-align:center;font-family:Georgia,serif;line-height:.95}.brand small{display:block;font:700 11px Inter,sans-serif;letter-spacing:.42em;color:var(--gold2);text-transform:uppercase;margin-bottom:3px}.brand strong{font-weight:400;font-size:36px;color:var(--gold2);text-shadow:0 0 25px rgba(232,172,58,.2)}.title{position:absolute;z-index:4;top:calc(102px + var(--safeTop));left:16px;right:16px;text-align:center}.title h1{font-family:Georgia,serif;font-size:43px;line-height:.98;font-weight:400;color:var(--gold2);letter-spacing:-.03em}.title p{font-family:Georgia,serif;font-size:18px;m ansform:uppercase;margin-bottom:8px}.card h2{font-family:Georgia,serif;font-weight:400;font-size:30px;line-height:1.05;color:#fff1c7;letter-spacing:-.03em}.card p{font-size:13px;color:rgba(255,247,225,.82);line-height:1.32;margin-top:9px}.hint{position:absolute;z-index:4;left:0;right:0;top:60.6%;text-align:center;font-size:12px;color:#d9b76f;font-style:italic;opacity:.92}.stats{position:absolute;z-index:5;left:20px;right:20px;top:64.4%;display:grid;grid-template-columns:repeat(4,1fr);gap:8px}.stat{height:78px;border-radius:999px;border:1px solid rgba(232,172,58,.42);background:rgba(2,8,18,.55);display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center}.stat .ico{font-size:22px;color:var(--gold2);line-height:1}.stat .label{font-family:Georgia,serif;font-size:13px;margin-top:2px}.stat .value{font-family:Georgia,serif;font-size:20px;color:#ffecaa;font-weight:700}.affinity{position:absolute;z-index:5;left:24px;right:24px;top:75%;min-height:58px;border-radius:22px;border:1px solid rgba(232,172,58,.42);background:rgba(2,8,18,.58);display:grid;grid-template-columns:54px 1fr 24px;align-items:center;padding:8px 14px}.affIcon{width:44px;height:44px;border-radius:50%;border:1px solid rgba(232,172,58,.38);display:grid;place-items:center;color:var(--gold2);font-family:Georgia,serif;font-size:28px}.affinity h3{font-family:Georgia,serif;font-size:20px;font-weight:400;color:#ffe6a4;line-height:1.05}.affinity p{font-size:12px;color:rgba(255,247,225,.80);margin-top:2px}.affArrow{font-size:25px;color:var(--gold2)}.luckyTitle{position:absolute;z-index:5;left:0;right:0;top:83.2%;text-align:center;font-family:Georgia,serif;font-size:24px;color:#ffdf90}.lucky{position:absolute;z-index:5;left:28px;right:28px;top:87%;height:70px;border-radius:20px;border:1px solid rgba(232,172,58,.38);background:rgba(2,8,18,.55);display:grid;grid-template-columns:1fr 1fr 1fr;overflow:hidden}.luck{display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;border-right:1px solid rgba(232,172,58,.22)}.luck:last-child{border-right:0}.luck small{font-family:Georgia,serif;font-size:12px;color:#fff2c4}.luck b{font-family:Georgia,serif;font-size:19px;color:#ffdf90;line-height:1.05;margin-top:4px}.cta{position:absolute;z-index:7;left:28px;right:28px;bottom:calc(16px + var(--safeBottom));height:58px;border-radius:999px;background:linear-gradient(100deg,#d88b18,#ffd978 58%,#fff0be);color:#070a13;font-weight:900;font-size:16px;box-shadow:0 16px 36px -12px rgba(255,217,120,.75)}.picker{position:absolute;z-index:30;left:14px;right:14px;bottom:calc(14px + var(--safeBottom));display:none;border:1px solid rgba(232,172,58,.46);border-radius:28px;background:rgba(2,9,20,.93);backdrop-filter:blur(14px);padding:20px 14px 14px}.picker.open{display:block}.picker h3{text-align:center;font-family:Georgia,serif;font-size:30px;font-weight:400;color:var(--gold2);margin-bottom:16px}.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}.zbtn{height:72px;border-radius:18px;border:1px solid rgba(232,172,58,.28);background:rgba(2,8,18,.55);display:flex;flex-direction:column;align-items:center;justify-content:center}.zbtn .g{font-family:Georgia,serif;color:var(--gold2);font-size:30px;line-height:1}.zbtn .n{font-size:12px;color:var(--muted);margin-top:5px}.zbtn.sel{border-color:rgba(255,217,120,.90);background:linear-gradient(160deg,rgba(255,217,120,.22),rgba(2,8,18,.60));box-shadow:0 0 24px rgba(255,217,120,.17)}.closePick{margin-top:14px;width:100%;height:56px;border-radius:999px;border:1px solid rgba(232,172,58,.32);background:rgba(2,8,18,.56);color:#ffdf90;font-weight:900;font-size:17px}.overlay{position:absolute;z-index:40;inset:0;display:none;align-items:center;justify-content:center;background:rgba(2,8,18,.72);backdrop-filter:blur(10px);padding:18px}.overlay.open{display:flex}.modal{width:100%;max-width:390px;text-align:center;border-radius:30px;border:1px solid rgba(232,172,58,.40);background:linear-gradient(180deg,rgba(7,24,45,.97),rgba(2,8,18,.98));padding:24px 20px;box-shadow:0 24px 80px rgba(0,0,0,.58)}.modal small{display:block;color:var(--gold2);font-size:10px;letter-spacing:.35em;text-transform:uppercase;margin-bottom:10px}.modal h2{font-family:Georgia,serif;font-size:36px;font-weight:400;line-height:1.02}.modal p{font-family:Georgia,serif;font-size:22px;line-height:1.38;margin-top:14px}.note{border:1px solid rgba(232,172,58,.25);border-radius:18px;color:var(--muted);padding:12px;font-size:13px;margin:14px 0}.btn{width:100%;height:54px;border-radius:999px;background:linear-gradient(100deg,#d88b18,#ffd978 58%,#fff0be);color:#070a13;font-weight:900;font-size:16px}.btn2{margin-top:10px;background:transparent;border:1px solid rgba(232,172,58,.30);color:var(--gold2)}@media(max-height:780px){.title h1{font-size:36px}.title{top:82px}.wheelWrap{top:19%;height:35%}.card{top:37%;padding:11px 14px}.card h2{font-size:25px}.stats{top:62.8%}.stat{height:66px}.affinity{top:73%}.luckyTitle{top:81.5%}.lucky{top:85.5%;height:62px}.cta{height:52px}}
</style></head><body><main class="app"><header class="top"><button class="iconBtn" onclick="openMenu()">☰</button><div class="brand"><small>Astro</small><strong>Galactic</strong></div><button class="iconBtn" onclick="openProfile()" id="profileGlyph">♓︎</button></header><section class="title"><h1>Message des étoiles</h1><p>Votre rituel cosmique quotidien</p></section><section class="wheelWrap"><div class="wheel" id="wheel"><div class="centerStar"></div></div></section><section class="card"><div class="date" id="date"></div><h2 id="message"></h2><p id="sub"></p></section><div class="hint">Faites glisser pour faire tourner la roue</div><section class="stats"><button class="stat" onclick="openDetail('Amour')"><span class="ico">♡</span><span class="label">Amour</span><span class="value" id="love"></span></button><button class="stat" onclick="openDetail('Argent')"><span class="ico">◉</span><span class="label">Argent</span><span class="value" id="money"></span></button><button class="stat" onclick="openDetail('Humeur')"><span class="ico">☻</span><span class="label">Humeur</span><span class="value" id="mood"></span></button><button class="stat" onclick="openDetail('Énergie')"><span class="ico">ϟ</span><span class="label">Énergie</span><span class="value" id="energy"></span></button></section><button class="affinity" onclick="openAffinity()"><span class="affIcon" id="affGlyph"></span><span><h3 id="affTitle"></h3><p id="affSub"></p></span><span class="affArrow">›</span></button><h2 class="luckyTitle">Vos éléments chanceux</h2><section class="lucky"><div class="luck"><small>Nombre</small><b id="num"></b></div><div class="luck"><small>Couleur</small><b id="color"></b></div><div class="luck"><small>Pierre</small><b id="stone"></b></div></section><button class="cta" onclick="openConseil()">Découvrir le conseil complet</button><div class="picker" id="picker"><h3>Choisissez votre signe</h3><div class="grid" id="grid"></div><button class="closePick" onclick="closePicker()">Fermer</button></div><div class="overlay" id="overlay" onclick="if(event.target===this)closeModal()"><div class="modal" id="modal"></div></div></main>
<script>
const SIGNS=[['belier','Bélier','♈︎','Une impulsion juste peut ouvrir une porte aujourd’hui.','Avancez avec courage, sans précipitation.','Lion','♌︎','Belle alliance de feu, élan et confiance.','Grenat','Rouge or','3',83,66,79,88],['taureau','Taureau','♉︎','La stabilité vous donne une vraie force aujourd’hui.','Restez ancré, la clarté vient dans le calme.','Vierge','♍︎','Connexion stable, fiable et rassurante.','Quartz rose','Vert doré','6',88,79,76,71],['gemeaux','Gémeaux','♊︎','Une conversation peut débloquer une situation.','Léger et vif, votre esprit ouvre des passages.','Balance','♎︎','Fluidité, échanges et bonne complicité.','Citrine','Jaune clair','5',73,74,86,80],['cancer','Cancer','♋︎','Votre intuition capte ce que les mots ne disent pas.','Fiez-vous à votre ressenti profond.','Poissons','♓︎','Une douceur sincère et protectrice.','Pierre de lune','Perle','2',90,68,84,72],['lion','Lion','♌︎','Aujourd’hui, l’univers vous invite à ralentir pour entendre votre voix intérieure.','Faites confiance à votre intuition, elle connaît le chemin.','Taureau','♉︎','Connexion solide et bienveillante.','Citrine','Or solaire','7',87,72,90,85],['vierge','Vierge','♍︎','Un détail bien réglé peut alléger toute votre journée.','L’ordre juste vous redonne de l’espace.','Capricorne','♑︎','Énergie constructive et très fiable.','Jaspe','Sable doré','4',77,81,74,78],['balance','Balance','♎︎','L’harmonie revient quand vous arrêtez de porter tout seul.','Un choix équilibré vous fera du bien.','Gémeaux','♊︎','Compréhension, légèreté et lien naturel.','Lapis-lazuli','Rose doré','8',84,69,82,73],['scorpion','Scorpion','♏︎','Une vérité intérieure demande à être respectée.','Restez lucide, votre force est précise.','Cancer','♋︎','Profondeur émotionnelle et loyauté.','Obsidienne','Pourpre','9',75,77,80,84],['sagittaire','Sagittaire','♐︎','Un nouvel horizon vous redonne de l’élan.','Osez viser plus loin, mais sans vous disperser.','Bélier','♈︎','Dynamique, stimulante et directe.','Turquoise','Bleu nuit','1',78,70,88,91],['capricorne','Capricorne','♑︎','Votre patience prépare une avancée solide.','La constance vous rend puissant aujourd’hui.','Taureau','♉︎','Lente, sûre et efficace.','Onyx','Bronze','10',74,85,72,79],['verseau','Verseau','♒︎','Une idée différente peut devenir votre avantage.','L’inspiration revient dès que vous respirez mieux.','Sagittaire','♐︎','Ouverture, liberté et vision commune.','Améthyste','Électrique','11',71,73,87,82],['poissons','Poissons','♓︎','Votre sensibilité devient une boussole précieuse.','Le calme vous aide à entendre la bonne réponse.','Cancer','♋︎','Lien intuitif, tendre et protecteur.','Aigue-marine','Bleu doré','7',90,70,82,74]].map(a=>({k:a[0],n:a[1],g:a[2],msg:a[3],sub:a[4],aff:a[5],affG:a[6],affSub:a[7],stone:a[8],color:a[9],num:a[10],love:a[11],money:a[12],mood:a[13],energy:a[14],conseil:'Gardez une intention simple et avancez avec calme. Votre ciel du jour vous demande de choisir l’essentiel.'}));
const $=s=>document.querySelector(s);let current=Number(localStorage.getItem('astro-v21-index')||11);function sign(){return SIGNS[current]}function dateFR(){return new Date().toLocaleDateString('fr-FR',{day:'numeric',month:'long',year:'numeric'})}function renderWheel(){const w=$('#wheel');[...w.querySelectorAll('.sign')].forEach(e=>e.remove());SIGNS.forEach((s,i)=>{const b=document.createElement('button');b.className='sign'+(i===current?' active':'');b.style.setProperty('--a',(i*30)+'deg');b.innerHTML=`<b>${s.g}</b><span>${s.n}</span>`;b.onclick=()=>selectSign(i);w.appendChild(b)})}function render(){const s=sign();localStorage.setItem('astro-v21-index',current);$('#profileGlyph').textContent=s.g;$('#date').textContent=dateFR();$('#message').textContent=s.msg;$('#sub').textContent=s.sub;$('#love').textContent=s.love+'%';$('#money').textContent=s.money+'%';$('#mood').textContent=s.mood+'%';$('#energy').textContent=s.energy+'%';$('#affGlyph').textContent=s.affG;$('#affTitle').textContent='Affinité du jour : '+s.aff;$('#affSub').textContent=s.affSub;$('#num').textContent=s.num;$('#color').textContent=s.color;$('#stone').textContent=s.stone;renderWheel();renderPicker()}function selectSign(i){current=i;render()}function nextSign(){current=(current+1)%SIGNS.length;render()}function previousSign(){current=(current+SIGNS.length-1)%SIGNS.length;render()}function renderPicker(){$('#grid').innerHTML=SIGNS.map((s,i)=>`<button class="zbtn ${i===current?'sel':''}" onclick="selectSign(${i});closePicker()"><span class="g">${s.g}</span><span class="n">${s.n}</span></button>`).join('')}function openPicker(){$('#picker').classList.add('open')}function closePicker(){$('#picker').classList.remove('open')}function openModal(h){$('#modal').innerHTML=h;$('#overlay').classList.add('open')}function closeModal(){$('#overlay').classList.remove('open')}function openConseil(){const s=sign();openModal(`<small>Conseil complet</small><h2>${s.g} ${s.n}</h2><p>${s.conseil}</p><div class="note">Amour ${s.love}% · Argent ${s.money}% · Humeur ${s.mood}% · Énergie ${s.energy}%</div><div class="note">Nombre ${s.num} · Couleur ${s.color} · Pierre ${s.stone}</div><button class="btn" onclick="closeModal()">Compris</button>`)}function openAffinity(){const s=sign();openModal(`<small>Affinité du jour</small><h2>${s.affG} ${s.aff}</h2><p>${s.affSub}</p><button class="btn" onclick="closeModal()">Fermer</button>`)}function openDetail(k){const s=sign();const v={Amour:s.love,Argent:s.money,Humeur:s.mood,'Énergie':s.energy}[k];openModal(`<small>${k}</small><h2>${v}%</h2><p>Votre vibration ${k.toLowerCase()} du jour pour ${s.n}.</p><button class="btn" onclick="closeModal()">Fermer</button>`)}function openMenu(){openModal(`<small>Astro Galactic</small><h2>Menu</h2><p>Choisissez votre signe et laissez le message se mettre à jour.</p><button class="btn" onclick="closeModal();openPicker()">Choisir un signe</button><button class="btn btn2" onclick="closeModal()">Fermer</button>`)}function openProfile(){const s=sign();openModal(`<small>Profil astral</small><h2>${s.g} ${s.n}</h2><p>${s.sub}</p><button class="btn" onclick="closeModal();openPicker()">Changer mon signe</button><button class="btn btn2" onclick="closeModal()">Fermer</button>`)}let startX=0,startY=0;const wheel=$('#wheel');wheel.addEventListener('touchstart',e=>{startX=e.touches[0].clientX;startY=e.touches[0].clientY},{passive:true});wheel.addEventListener('touchend',e=>{const dx=e.changedTouches[0].clientX-startX,dy=e.changedTouches[0].clientY-startY;if(Math.abs(dx)>45&&Math.abs(dx)>Math.abs(dy)){dx<0?nextSign():previousSign()}},{passive:true});render();if('serviceWorker'in navigator){navigator.serviceWorker.register('/sw.js').catch(()=>{})}
</script></body></html>
