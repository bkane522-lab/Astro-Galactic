<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Astro Galactic — Ton horoscope cosmique</title>
<meta name="description" content="Horoscope quotidien, thème astral et compatibilité amoureuse générés par IA. Par DJ Kizomba Galactic.">
<meta name="theme-color" content="#1a0b2e">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/icons/icon-192.png">
<style>
  :root{
    --gold:#f5c542;
    --gold-soft:#e8b923;
    --purple-deep:#1a0b2e;
    --purple-mid:#2d1550;
    --purple-glow:#6b2fb3;
    --violet:#9d4edd;
    --text:#f4ecff;
    --text-dim:#b9a8d9;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    font-family:'Segoe UI',system-ui,-apple-system,sans-serif;
    background:radial-gradient(ellipse at top,var(--purple-mid) 0%,var(--purple-deep) 60%,#0d0518 100%);
    color:var(--text);
    min-height:100vh;
    overflow-x:hidden;
    position:relative;
  }
  body::before{
    content:'';
    position:fixed;inset:0;
    background-image:
      radial-gradient(2px 2px at 20% 30%, white, transparent),
      radial-gradient(2px 2px at 60% 70%, white, transparent),
      radial-gradient(1px 1px at 80% 20%, white, transparent),
      radial-gradient(1px 1px at 40% 85%, white, transparent),
      radial-gradient(2px 2px at 90% 55%, white, transparent),
      radial-gradient(1px 1px at 10% 65%, white, transparent);
    background-size:200% 200%;
    opacity:0.4;
    pointer-events:none;
    z-index:0;
  }
  .app{position:relative;z-index:1;max-width:480px;margin:0 auto;padding:24px 20px 60px;}
  header{text-align:center;margin-bottom:28px;}
  .logo{font-size:2.2rem;margin-bottom:4px;}
  h1{
    font-size:1.5rem;
    background:linear-gradient(90deg,var(--gold),var(--violet));
    -webkit-background-clip:text;background-clip:text;color:transparent;
    font-weight:700;
  }
  .tagline{color:var(--text-dim);font-size:0.8rem;font-style:italic;margin-top:4px;}

  .card{
    background:linear-gradient(160deg,rgba(157,78,221,0.12),rgba(245,197,66,0.05));
    border:1px solid rgba(245,197,66,0.25);
    border-radius:20px;
    padding:22px;
    margin-bottom:20px;
    backdrop-filter:blur(6px);
    box-shadow:0 8px 32px rgba(107,47,179,0.25);
  }

  .setup-card label{
    display:block;font-size:0.85rem;color:var(--gold);margin-bottom:6px;margin-top:14px;font-weight:600;
  }
  .setup-card label:first-child{margin-top:0;}
  input[type="date"], input[type="time"], input[type="text"]{
    width:100%;padding:12px 14px;border-radius:12px;
    border:1px solid rgba(245,197,66,0.3);
    background:rgba(13,5,24,0.6);color:var(--text);font-size:1rem;
  }
  input::-webkit-calendar-picker-indicator{filter:invert(1);}
  .optional-tag{color:var(--text-dim);font-weight:400;font-size:0.75rem;}

  .btn-primary{
    width:100%;margin-top:20px;padding:14px;border:none;border-radius:14px;
    background:linear-gradient(90deg,var(--gold-soft),var(--gold));
    color:#1a0b2e;font-weight:700;font-size:1rem;cursor:pointer;
    box-shadow:0 4px 18px rgba(245,197,66,0.35);
    transition:transform 0.15s ease;
  }
  .btn-primary:active{transform:scale(0.97);}
  .btn-primary:disabled{opacity:0.6;}

  .sign-badge{
    display:flex;align-items:center;gap:12px;margin-bottom:16px;
  }
  .sign-emoji{font-size:2.4rem;}
  .sign-name{font-size:1.3rem;font-weight:700;color:var(--gold);}
  .sign-dates{font-size:0.75rem;color:var(--text-dim);}

  .horoscope-text{line-height:1.6;font-size:0.95rem;color:var(--text);white-space:pre-wrap;}
  .loading{display:flex;align-items:center;gap:10px;color:var(--text-dim);font-size:0.9rem;}
  .spinner{
    width:18px;height:18px;border-radius:50%;
    border:2px solid rgba(245,197,66,0.3);border-top-color:var(--gold);
    animation:spin 0.8s linear infinite;
  }
  @keyframes spin{to{transform:rotate(360deg);}}

  .section-title{font-size:0.75rem;text-transform:uppercase;letter-spacing:1px;color:var(--violet);margin-bottom:10px;font-weight:700;}

  .premium-teaser{
    display:flex;justify-content:space-between;align-items:center;
    padding:16px;border-radius:16px;
    background:linear-gradient(120deg,rgba(157,78,221,0.25),rgba(245,197,66,0.15));
    border:1px solid rgba(245,197,66,0.4);
  }
  .premium-teaser div{flex:1;}
  .premium-title{font-weight:700;color:var(--gold);font-size:0.95rem;}
  .premium-desc{font-size:0.78rem;color:var(--text-dim);margin-top:2px;}
  .btn-premium{
    padding:10px 16px;border:none;border-radius:10px;
    background:var(--gold);color:#1a0b2e;font-weight:700;font-size:0.85rem;
    white-space:nowrap;cursor:pointer;
  }

  .hidden{display:none !important;}
  .change-birthdate{
    background:none;border:none;color:var(--text-dim);font-size:0.78rem;
    text-decoration:underline;margin-top:14px;cursor:pointer;
  }
  footer{text-align:center;margin-top:30px;font-size:0.7rem;color:var(--text-dim);}
</style>
</head>
<body>
<div class="app">

  <header>
    <div class="logo">🦁✨</div>
    <h1>Astro Galactic</h1>
    <div class="tagline">Sounds from elsewhere, never heard, never known</div>
  </header>

  <!-- ÉCRAN 1 : Saisie date de naissance -->
  <section id="setupScreen" class="card setup-card">
    <div class="section-title">Ton portrait cosmique</div>

    <label for="birthDate">Date de naissance</label>
    <input type="date" id="birthDate" required>

    <label for="birthTime">Heure de naissance <span class="optional-tag">(optionnel — thème avancé)</span></label>
    <input type="time" id="birthTime">

    <label for="birthPlace">Lieu de naissance <span class="optional-tag">(optionnel — thème avancé)</span></label>
    <input type="text" id="birthPlace" placeholder="Ville, Pays">

    <button class="btn-primary" id="revealBtn">Révéler mon signe ✨</button>
  </section>

  <!-- ÉCRAN 2 : Horoscope du jour -->
  <section id="resultScreen" class="hidden">

    <div class="card">
      <div class="sign-badge">
        <div class="sign-emoji" id="signEmoji">♈</div>
        <div>
          <div class="sign-name" id="signName">—</div>
          <div class="sign-dates" id="signDates">—</div>
        </div>
      </div>
      <div class="section-title">Horoscope du jour</div>
      <div id="horoscopeContent">
        <div class="loading"><div class="spinner"></div> Consultation des étoiles...</div>
      </div>
    </div>

    <div class="card premium-teaser">
      <div>
        <div class="premium-title">Thème astral complet</div>
        <div class="premium-desc">Analyse détaillée + compatibilité amoureuse</div>
      </div>
      <button class="btn-premium" id="premiumBtn">Débloquer</button>
    </div>

    <button class="change-birthdate" id="changeBtn">Changer ma date de naissance</button>
  </section>

  <footer>DJ Kizomba Galactic · Astro Galactic 🌌</footer>
</div>

<script src="/app.js"></script>
</body>
</html>
